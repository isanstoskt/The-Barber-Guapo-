<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Guapo The Barber</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">

  <main class="login-admin-container">
    <section class="login-admin-card">
      <div class="login-admin-logo">
        <h1>Guapo</h1>
        <span>The Barber</span>
      </div>

      <p class="admin-tag">Área de acesso</p>
      <h2>Entrar na conta</h2>
      <p class="login-admin-texto">
        Acesse sua conta para agendar, acompanhar seus cortes ou gerenciar os horários.
      </p>

      <form id="formLogin" class="login-admin-form">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          placeholder="Digite seu e-mail" 
          required 
        />

        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha" 
          placeholder="Digite sua senha" 
          required 
        />

        <button type="submit">Entrar</button>
      </form>

      <p id="mensagemLogin" class="mensagem-login"></p>

      <div class="login-links">
        <a href="cadastro.html" class="login-voltar">Criar conta</a>
        <a href="index.html" class="login-voltar">Voltar para o site</a>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>

  <script>
    const formLogin = document.getElementById("formLogin");
    const mensagemLogin = document.getElementById("mensagemLogin");

    formLogin.addEventListener("submit", function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      const retorno = fazerLogin(email, senha);

      if (!retorno.sucesso) {
        mensagemLogin.textContent = retorno.mensagem;
        mensagemLogin.classList.add("erro");
        return;
      }

      mensagemLogin.textContent = "";
      mensagemLogin.classList.remove("erro");

      const usuario = retorno.usuario;

      if (usuario.tipo === "barbeiro") {
        window.location.href = "painel.html";
      } else {
        window.location.href = "cliente.html";
      }
    });
  </script>

</body>
</html>
