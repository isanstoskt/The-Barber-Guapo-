<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chat - Guapo The Barber</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">

  <main class="chat-container">
    <section class="chat-card">

      <header class="chat-header">
        <div class="login-admin-logo">
          <h1>Guapo</h1>
          <span>The Barber</span>
        </div>

        <a href="cliente.html" class="chat-voltar">Voltar</a>
      </header>

      <div class="chat-info">
        <p class="admin-tag">Atendimento</p>
        <h2>Conversar com o barbeiro</h2>
        <p>Envie sua dúvida, pedido de ajuste ou mensagem sobre seu agendamento.</p>
      </div>

      <div class="chat-mensagens" id="chatMensagens">
        <div class="chat-vazio">
          <p>Carregando mensagens...</p>
        </div>
      </div>

      <form id="formChat" class="chat-form">
        <input 
          type="text" 
          id="mensagemTexto" 
          placeholder="Digite sua mensagem..." 
          required
        />

        <button type="submit" id="btnEnviarMensagem">Enviar</button>
      </form>

    </section>
  </main>

  <script src="auth.js"></script>

  <script>
    const API_CHAT_URL = "http://localhost:3000";

    const usuarioLogado = pegarUsuarioLogado();

    if (!usuarioLogado) {
      window.location.href = "login.html";
      throw new Error("Usuário não logado.");
    }

    if (usuarioLogado.tipo === "barbeiro") {
      window.location.href = "painel.html";
      throw new Error("Barbeiro redirecionado para o painel.");
    }

    const chatMensagens = document.getElementById("chatMensagens");
    const formChat = document.getElementById("formChat");
    const mensagemTexto = document.getElementById("mensagemTexto");
    const btnEnviarMensagem = document.getElementById("btnEnviarMensagem");

    function escaparHTML(texto) {
      const div = document.createElement("div");
      div.textContent = texto || "";
      return div.innerHTML;
    }

    function formatarHora(dataISO) {
      if (!dataISO) return "";

      const data = new Date(dataISO);

      return data.toLocaleString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function marcarMensagensDoBarbeiroComoLidas() {
      try {
        await fetch(`${API_CHAT_URL}/api/mensagens/${usuarioLogado.id}/lidas-cliente`, {
          method: "PATCH"
        });
      } catch (erro) {
        console.error("Erro ao marcar mensagens como lidas:", erro);
      }
    }

    async function carregarMensagens() {
      try {
        const resposta = await fetch(`${API_CHAT_URL}/api/mensagens/${usuarioLogado.id}`);
        const mensagens = await resposta.json();

        renderizarMensagens(mensagens);

        await marcarMensagensDoBarbeiroComoLidas();

      } catch (erro) {
        console.error("Erro ao carregar mensagens:", erro);

        chatMensagens.innerHTML = `
          <div class="chat-vazio">
            <p>Erro ao carregar mensagens.</p>
            <span>Verifique se a API está ligada.</span>
          </div>
        `;
      }
    }

    function renderizarMensagens(mensagens) {
      if (!mensagens || mensagens.length === 0) {
        chatMensagens.innerHTML = `
          <div class="chat-vazio">
            <p>Nenhuma mensagem ainda.</p>
            <span>Envie uma mensagem para iniciar a conversa.</span>
          </div>
        `;
        return;
      }

      chatMensagens.innerHTML = mensagens.map(function (mensagem) {
        const classeAutor = mensagem.autor === "cliente" ? "mensagem-cliente" : "mensagem-barbeiro";
        const nomeAutor = mensagem.autor === "cliente" ? "Você" : "Guapo";

        return `
          <div class="mensagem-chat ${classeAutor}">
            <div class="mensagem-balao">
              <strong>${escaparHTML(nomeAutor)}</strong>
              <p>${escaparHTML(mensagem.texto)}</p>
              <span>${formatarHora(mensagem.dataHora)}</span>
            </div>
          </div>
        `;
      }).join("");

      chatMensagens.scrollTop = chatMensagens.scrollHeight;
    }

    formChat.addEventListener("submit", async function (event) {
      event.preventDefault();

      const texto = mensagemTexto.value.trim();

      if (!texto) return;

      btnEnviarMensagem.disabled = true;
      btnEnviarMensagem.textContent = "Enviando...";

      try {
        const resposta = await fetch(`${API_CHAT_URL}/api/mensagens`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            clienteId: usuarioLogado.id,
            autor: "cliente",
            texto: texto
          })
        });

        const retorno = await resposta.json();

        if (!resposta.ok || !retorno.sucesso) {
          alert(retorno.mensagem || "Erro ao enviar mensagem.");
          return;
        }

        mensagemTexto.value = "";
        await carregarMensagens();

      } catch (erro) {
        console.error("Erro ao enviar mensagem:", erro);
        alert("Erro ao conectar com a API. Verifique se o servidor está ligado.");
      } finally {
        btnEnviarMensagem.disabled = false;
        btnEnviarMensagem.textContent = "Enviar";
      }
    });

    carregarMensagens();

    setInterval(function () {
      carregarMensagens();
    }, 5000);
  </script>

</body>
</html>
